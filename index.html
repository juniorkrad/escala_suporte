<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Suporte Básico - Gestão de Escala Interativa</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --md-sys-color-background: #1C1B1F;
    --md-sys-color-on-background: #E6E1E5;
    --md-sys-color-surface: #2B2930;
    --md-sys-color-primary: #D0BCFF;
    --md-sys-color-outline: #49454F;
    --md-sys-color-secondary: #CCC2DC;
    --md-sys-color-error: #F2B8B5;
    --md-sys-color-success: #C4EED0;
    --md-sys-color-tertiary: #EFB8C8;
    --md-sys-color-surface-variant: #49454F;
  }

  body {
    background-color: var(--md-sys-color-background);
    color: var(--md-sys-color-on-background);
    font-family: 'Roboto Mono', monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    scrollbar-width: auto;
    scrollbar-color: var(--md-sys-color-surface-variant) var(--md-sys-color-surface);
  }

  /* Estilização da Barra de Rolagem */
  ::-webkit-scrollbar {
    width: 12px;
  }
  ::-webkit-scrollbar-track {
    background: var(--md-sys-color-surface);
  }
  ::-webkit-scrollbar-thumb {
    background-color: var(--md-sys-color-surface-variant);
    border-radius: 6px;
    border: 3px solid var(--md-sys-color-surface);
  }
  ::-webkit-scrollbar-thumb:hover {
    background-color: var(--md-sys-color-outline);
  }

  header {
    background-color: var(--md-sys-color-surface);
    padding: 16px 24px;
    border-bottom: 1px solid var(--md-sys-color-outline);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  h2 { margin: 0; color: var(--md-sys-color-primary); font-size: 1.2rem; text-transform: uppercase; }

  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Painel Esquerdo (Agrupa Legenda + Calendário) */
  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .legend {
    display: flex;
    gap: 12px;
    font-size: 0.75rem;
    color: var(--md-sys-color-secondary);
    flex-wrap: wrap;
    justify-content: center;
    padding: 16px 24px 8px 24px; 
  }

  .legend span {
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--md-sys-color-outline);
  }

  .calendar-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 24px 24px; 
  }

  .month-title { color: var(--md-sys-color-secondary); margin-bottom: 16px; margin-top: 16px; border-bottom: 1px solid var(--md-sys-color-outline); padding-bottom: 8px;}
  .month-title:first-child { margin-top: 0; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    background-color: var(--md-sys-color-surface);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--md-sys-color-outline);
  }

  .day-header {
    color: var(--md-sys-color-primary);
    font-weight: 700;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--md-sys-color-outline);
    font-size: 0.85rem;
  }

  .day-cell {
    background-color: rgba(255, 255, 255, 0.02);
    border-radius: 6px;
    padding: 6px;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .empty-cell { background-color: transparent; border: none; }
  .weekend { background-color: rgba(255, 255, 255, 0.04); }

  .date-number {
    font-weight: 700;
    font-size: 1rem;
    color: var(--md-sys-color-on-background);
    margin-bottom: 6px;
    align-self: flex-end;
  }

  .shift-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }

  .emp-name {
    flex: 1;
    min-width: 0;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--md-sys-color-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Estilo dos Selects */
  .shift-select {
    width: 76px;
    font-family: 'Roboto Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 2px 4px;
    border-radius: 4px;
    appearance: none;
    cursor: pointer;
    outline: none;
    text-align: left; 
  }

  .shift-select option { background-color: var(--md-sys-color-surface); color: var(--md-sys-color-on-background); font-size: 0.8rem;}

  /* Cores Suaves Mapeadas */
  .s-normal { background-color: transparent; color: var(--md-sys-color-secondary); border: 1px solid rgba(204, 194, 220, 0.3); }
  .s-plantao { background-color: rgba(208, 188, 255, 0.2); color: #D0BCFF; border: 1px solid rgba(208, 188, 255, 0.4); } 
  .s-sabado { background-color: rgba(180, 180, 180, 0.15); color: #D0D0D0; border: 1px solid rgba(180, 180, 180, 0.4); } 
  .s-folga { background-color: rgba(168, 230, 207, 0.15); color: #A8E6CF; border: 1px solid rgba(168, 230, 207, 0.4); } 
  .s-ferias { background-color: rgba(255, 204, 153, 0.15); color: #FFCC99; border: 1px solid rgba(255, 204, 153, 0.4); } 
  .s-manha { background-color: rgba(253, 253, 150, 0.15); color: #FDFD96; border: 1px solid rgba(253, 253, 150, 0.4); } 
  .s-tarde { background-color: rgba(174, 196, 232, 0.15); color: #AEC4E8; border: 1px solid rgba(174, 196, 232, 0.4); } 

  /* Área de Auditoria (Dashboard Lateral) - Cola no Topo */
  .audit-area {
    width: 250px;
    background-color: var(--md-sys-color-surface);
    border-left: 1px solid var(--md-sys-color-outline);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .audit-header {
    padding: 16px;
    background-color: var(--md-sys-color-surface); 
    border-bottom: 1px solid var(--md-sys-color-outline);
    position: sticky;
    top: 0;
    font-weight: 700;
    color: var(--md-sys-color-primary);
    z-index: 5; 
  }

  .employee-card {
    padding: 16px;
    border-bottom: 1px solid var(--md-sys-color-outline);
  }

  .employee-name {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--md-sys-color-on-background);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    margin-bottom: 6px;
    padding: 4px 8px;
    background-color: rgba(255,255,255,0.02);
    border-radius: 4px;
  }

  .stat-alert {
    background-color: rgba(242, 184, 181, 0.15) !important;
    color: var(--md-sys-color-error);
    border: 1px solid var(--md-sys-color-error);
    font-weight: 700;
  }
  
  /* Responsividade Tela Menor */
  @media (max-width: 900px) {
    .main-container { flex-direction: column; overflow-y: auto; }
    .left-panel { overflow-y: visible; }
    .calendar-area { overflow-y: visible; padding: 12px; }
    .audit-area { width: 100%; border-left: none; border-top: 1px solid var(--md-sys-color-outline); overflow-y: visible; }
    .calendar-grid { grid-template-columns: repeat(1, 1fr); gap: 12px; padding: 0; background: transparent; border: none;}
    .day-header { display: none; }
    .day-cell { min-height: auto; padding: 12px; border: 1px solid var(--md-sys-color-outline); background-color: var(--md-sys-color-surface); }
    .date-number::before { content: "Dia "; }
  }

  /* =========================================
     ESTILOS DE IMPRESSÃO / PDF
     ========================================= */
  @media print {
    @page {
      size: landscape;
      margin: 10mm;
    }

    body, .main-container, .left-panel, .calendar-area {
      height: auto !important;
      overflow: visible !important;
      background-color: #ffffff !important;
      color: #000000 !important;
      display: block !important;
    }

    .audit-area, .legend, ::-webkit-scrollbar {
      display: none !important;
    }

    header {
      border-bottom: 2px solid #000 !important;
      padding: 0 0 12px 0 !important;
      margin-bottom: 20px !important;
      background-color: transparent !important;
    }

    h2 { color: #000000 !important; }
    header div { color: #333333 !important; }
    .calendar-area { padding: 0 !important; }

    .calendar-grid {
      background-color: transparent !important;
      border: 1px solid #cccccc !important;
      gap: 2px !important;
      padding: 4px !important;
    }

    .day-header {
      color: #000000 !important;
      border-bottom: 1px solid #000000 !important;
    }

    .day-cell {
      background-color: #ffffff !important;
      border: 1px solid #cccccc !important;
      min-height: auto !important;
      break-inside: avoid !important;
    }

    .weekend { background-color: #f4f4f4 !important; }

    .date-number {
      color: #000000 !important;
      font-size: 1.1rem !important;
      border-bottom: 1px solid #eeeeee;
      width: 100%;
      text-align: right;
      padding-bottom: 2px;
    }

    .emp-name {
      color: #000000 !important;
      font-weight: bold !important;
    }

    .shift-select {
      background-color: transparent !important;
      border: none !important;
      color: #000000 !important;
      -webkit-appearance: none !important;
      -moz-appearance: none !important;
      appearance: none !important;
      padding: 0 !important;
      text-align: left !important;
      width: auto !important;
      font-size: 0.7rem !important;
    }
    
    .shift-row {
      border-bottom: 1px dashed #dddddd;
      padding: 2px 0;
    }
    
    .shift-row:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<header>
  <h2>Painel de Auditoria Suporte Básico</h2>
  <div style="font-size: 0.8rem; color: var(--md-sys-color-secondary);">Limites: 44h semanais | Máx 6 dias seguidos</div>
</header>

<div class="main-container">
  <div class="left-panel">
    <div class="legend">
      <span class="s-normal">🏢 7h / 8h / 9h</span>
      <span class="s-plantao">🚨 Plantão (8h)</span>
      <span class="s-sabado">⏱️ Curto (4h)</span>
      <span class="s-manha">🌅 Manhã (4h)</span>
      <span class="s-tarde">🌇 Tarde (4h)</span>
      <span class="s-ferias">🏖️ Férias (0h)</span>
      <span class="s-folga">🌴 Folga (0h)</span>
    </div>

    <div class="calendar-area" id="calendarArea">
      </div>
  </div>

  <div class="audit-area">
    <div class="audit-header">📊 Análise em Tempo Real</div>
    <div id="auditContent">
      </div>
  </div>
</div>

<script>
  // Configuração da Equipe Suporte Básico (Nomes Abreviados)
  const employees = ['GLAUCIA', 'LUIS G.', 'CRISTOFER', 'DEIVISSON', 'ÁTILA', 'FELIPE', 'TAIANE', 'ISABELA', 'DANIEL', 'LUIZ A.', 'JUAN', 'FABIO'];
  
  const shifts = {
    'normal_7': { emoji: '🏢', label: '7h', hours: 7, class: 's-normal' },
    'normal':   { emoji: '🏢', label: '8h', hours: 8, class: 's-normal' },
    'normal_9': { emoji: '🏢', label: '9h', hours: 9, class: 's-normal' },
    'plantao':  { emoji: '🚨', label: '8h', hours: 8, class: 's-plantao' },
    'sabado':   { emoji: '⏱️', label: '4h', hours: 4, class: 's-sabado' },
    'manha':    { emoji: '🌅', label: 'Manhã', hours: 4, class: 's-manha' },
    'tarde':    { emoji: '🌇', label: 'Tarde', hours: 4, class: 's-tarde' },
    'ferias':   { emoji: '🏖️', label: 'Férias', hours: 0, class: 's-ferias' },
    'folga':    { emoji: '🌴', label: 'Folga', hours: 0, class: 's-folga' }
  };

  // Gerador de Calendário
  const calendarData = [
    { month: 'Março 2026', days: 31, startDay: 0 }, 
    { month: 'Abril 2026', days: 30, startDay: 3 }  
  ];

  const calendarArea = document.getElementById('calendarArea');
  let globalDayCounter = 0; 

  function createSelectOptions(selectedKey) {
    let html = '';
    for (const [key, shift] of Object.entries(shifts)) {
      const isSelected = key === selectedKey ? 'selected' : '';
      html += `<option value="${key}" ${isSelected}>${shift.emoji} ${shift.label}</option>`;
    }
    return html;
  }

  function initApp() {
    calendarData.forEach(month => {
      calendarArea.innerHTML += `<h3 class="month-title">${month.month}</h3>`;
      
      const grid = document.createElement('div');
      grid.className = 'calendar-grid';
      
      const daysOfWeek = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
      daysOfWeek.forEach(d => {
        grid.innerHTML += `<div class="day-header">${d}</div>`;
      });

      for (let i = 0; i < month.startDay; i++) {
        grid.innerHTML += `<div class="day-cell empty-cell"></div>`;
      }

      for (let day = 1; day <= month.days; day++) {
        const currentWeekDay = (month.startDay + day - 1) % 7;
        const isWeekend = currentWeekDay === 0 || currentWeekDay === 6;
        
        let cellHtml = `<div class="day-cell ${isWeekend ? 'weekend' : ''}" data-day="${globalDayCounter}" data-weekday="${currentWeekDay}">`;
        cellHtml += `<div class="date-number">${day}</div>`;
        
        employees.forEach(emp => {
          let defaultShift = 'normal';
          if (currentWeekDay === 0) defaultShift = 'folga';
          if (currentWeekDay === 6) defaultShift = 'sabado';
          
          cellHtml += `
            <div class="shift-row">
              <span class="emp-name" title="${emp}">${emp}</span>
              <select class="shift-select ${shifts[defaultShift].class}" 
                      data-emp="${emp}" 
                      data-day="${globalDayCounter}"
                      onchange="updateShift(this)">
                ${createSelectOptions(defaultShift)}
              </select>
            </div>
          `;
        });
        
        cellHtml += `</div>`;
        grid.innerHTML += cellHtml;
        globalDayCounter++;
      }
      
      calendarArea.appendChild(grid);
    });

    calculateAudit(); 
  }

  window.updateShift = function(selectElement) {
    const val = selectElement.value;
    selectElement.className = `shift-select ${shifts[val].class}`;
    calculateAudit();
  };

  function calculateAudit() {
    const auditContent = document.getElementById('auditContent');
    auditContent.innerHTML = '';
    
    const allSelects = document.querySelectorAll('.shift-select');
    
    const empData = {};
    employees.forEach(emp => {
      empData[emp] = { days: [] };
    });

    allSelects.forEach(select => {
      const emp = select.getAttribute('data-emp');
      const dayIndex = parseInt(select.getAttribute('data-day'));
      const shiftKey = select.value;
      const hours = shifts[shiftKey].hours;
      
      empData[emp].days[dayIndex] = hours;
    });

    employees.forEach(emp => {
      let consecutiveDays = 0;
      let maxConsecutive = 0;
      let weeklyHours = 0;
      let weekCount = 1;
      
      let htmlStats = '';

      for (let i = 0; i < globalDayCounter; i++) {
        const hours = empData[emp].days[i] || 0;
        
        const actualWeekDay = (0 + i) % 7; 
        
        if (actualWeekDay === 0 && i !== 0) {
          const alertClass = weeklyHours > 44 ? 'stat-alert' : '';
          htmlStats += `<div class="stat-row ${alertClass}"><span>Semana ${weekCount}:</span> <span>${weeklyHours}h</span></div>`;
          
          weeklyHours = 0; 
          weekCount++;
        }

        if (hours > 0) {
          consecutiveDays++;
          if (consecutiveDays > maxConsecutive) maxConsecutive = consecutiveDays;
        } else {
          consecutiveDays = 0; 
        }

        weeklyHours += hours;

        if (i === globalDayCounter - 1) {
             const alertClass = weeklyHours > 44 ? 'stat-alert' : '';
             htmlStats += `<div class="stat-row ${alertClass}"><span>Semana ${weekCount}:</span> <span>${weeklyHours}h</span></div>`;
        }
      }

      const consecAlert = maxConsecutive > 6 ? 'stat-alert' : '';
      
      const card = `
        <div class="employee-card">
          <div class="employee-name">🧑‍💻 ${emp}</div>
          <div class="stat-row ${consecAlert}">
            <span>Máx Dias Seguidos:</span> 
            <span>${maxConsecutive} dias</span>
          </div>
          ${htmlStats}
        </div>
      `;
      auditContent.innerHTML += card;
    });
  }

  window.onload = initApp;

</script>
</body>
</html>
